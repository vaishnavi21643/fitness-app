spring:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: test
  rabbitmq:
    host: localhost
    port: 5672        # ← was 15672 (that's the management UI, not AMQP)
    username: guest
    password: guest

server:
  port: 8081

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking
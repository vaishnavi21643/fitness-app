#spring.application.name=userservice

server:
  port: 8083

spring:
  application:
    name: ai-service
  data:
    mongodb:
      host: localhost
      port: 27017
      database: fitnessrecommendation
  rabbitmq:
    host: localhost
    port: 5672        # ← was 15672 (that's the management UI, not AMQP)
    username: guest
    password: guest

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/



rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking

gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}